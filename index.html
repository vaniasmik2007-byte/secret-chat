<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Private Chat</title>
    <style>
        :root { --primary: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 95%; max-width: 400px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 30px; text-align: center; }
        #chat-box { height: 350px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .msg { background: rgba(0, 255, 136, 0.1); padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(0, 255, 136, 0.2); word-wrap: break-word; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="login-section" class="container">
        <h2 style="margin-top: 0;">🔒 СЕКРЕТНИЙ ВХІД</h2>
        <input type="password" id="pass-code" placeholder="Введіть код">
        <button onclick="unlock()">УВІЙТИ</button>
    </div>

    <div id="chat-section" class="container" style="display: none; max-width: 500px;">
        <div id="chat-box"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="msg-input" placeholder="Повідомлення...">
            <button onclick="sendMsg()" style="width:70px;">🚀</button>
        </div>
    </div>

    <!-- Завантажуємо бібліотеку Supabase через CDN -->
    <script src="https://unpkg.com"></script>

    <script>
        const SUPABASE_URL = 'https://cenlzbfoyeyykvuxwfof.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ooL5fspe-_GO8LKBFusdRg_MR1eozbJ';
        
        let client;

        // Чекаємо завантаження сторінки
        window.onload = function() {
            try {
                client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            } catch (e) {
                console.error("Система не завантажена");
            }
        };

        function unlock() {
            const input = document.getElementById('pass-code').value;
            if (input === "4269") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';
                loadMsgs();
                subscribe();
            } else { alert("Невірно!"); }
        }

        async function loadMsgs() {
            const { data } = await client.from('messages').select('*').order('created_at', { ascending: true });
            if (data) {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                data.forEach(m => renderMsg(m.text));
            }
        }

        function subscribe() {
            client.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                renderMsg(payload.new.text);
            }).subscribe();
        }

        function renderMsg(text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if (!val || !client) return;
            await client.from('messages').insert();
            input.value = "";
        }
    </script>
</body>
</html>
