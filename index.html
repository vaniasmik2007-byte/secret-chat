<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Cloud Chat v17</title>
    
    <!-- БІБЛІОТЕКИ FIREBASE -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <style>
        :root { --bg: #080808; --panel: #121212; --primary: #00ff88; --text: #f0f0f0; --border: #2a2a2a; }
        .light-theme { --bg: #f5f7fa; --panel: #ffffff; --primary: #007bff; --text: #1a1a1a; --border: #dee2e6; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: var(--panel); border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 600px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #chat-window { height: 500px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.02); }
        .message { padding: 12px 16px; border-radius: 18px; background: #1c1c1c; border-left: 4px solid var(--primary); max-width: 85%; align-self: flex-start; }
        .input-area { display: flex; gap: 10px; padding: 15px; border-top: 1px solid var(--border); }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: inherit; outline: none; }
        .btn { background: var(--primary); border: none; border-radius: 12px; padding: 12px 20px; cursor: pointer; font-weight: bold; color: #000; }
        #status { font-size: 10px; text-align: center; opacity: 0.5; margin-top: 5px; }
    </style>
</head>
<body>

<div id="login-section" class="card" style="max-width:350px; padding:30px; text-align:center;">
    <h2>🔐 CLOUD LOGIN</h2>
    <input type="text" id="nick" placeholder="Нікнейм">
    <input type="password" id="pass" placeholder="Пароль">
    <button class="btn" style="width:100%; margin-top:15px;" onclick="login()">УВІЙТИ</button>
</div>

<div id="chat-section" style="display: none; width:100%; max-width:600px;">
    <div id="status">Підключення...</div>
    <div class="card">
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="msg-input" onkeyup="if(event.key==='Enter') sendMessage()">
            <button class="btn" onclick="sendMessage()">🚀</button>
        </div>
    </div>
</div>

<script>
    var myUser = "";
    var database;

    var firebaseConfig = {
        apiKey: "AIzaSyD03EYUjSS3zTbHgcZugOWoMPhnhMMyAnM",
        authDomain: "mysecretchat-aed68.firebaseapp.com",
        databaseURL: "https://mysecretchat-aed68-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mysecretchat-aed68",
        storageBucket: "mysecretchat-aed68.firebasestorage.app",
        messagingSenderId: "1004541515416",
        appId: "1:1004541515416:web:7136a6692bd119f12fe2ed"
    };

    // Ініціалізація з явною вказівкою бази
    try {
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        console.log("Firebase OK!");
    } catch (e) { console.error(e); }

    function login() {
        var p = document.getElementById('pass').value;
        var n = document.getElementById('nick').value.trim();
        if (p === "4269" && n) {
            myUser = n;
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('chat-section').style.display = 'block';
            document.getElementById('status').innerText = "В мережі (" + myUser + ")";
            startListening();
        } else { alert("Код 4269!"); }
    }

    function sendMessage() {
        var inp = document.getElementById('msg-input');
        var val = inp.value.trim();
        if (!val) return;

        // Пряма відправка в базу
        database.ref('messages').push({
            u: myUser,
            txt: val,
            t: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})
        }).then(() => {
            console.log("Відправлено!");
            inp.value = ""; // Тепер точно очиститься
            inp.focus();
        }).catch((err) => {
            alert("Помилка відправки: " + err.message);
        });
    }

    function startListening() {
        database.ref('messages').limitToLast(40).on('value', function(snap) {
            var win = document.getElementById('chat-window');
            win.innerHTML = '';
            snap.forEach(function(child) {
                var m = child.val();
                var hue = [...m.u].reduce((a,c)=>c.charCodeAt(0)+(a<<5)-a,0)%360;
                var div = document.createElement('div');
                div.className = 'message';
                div.style.borderLeftColor = 'hsl('+hue+', 70%, 60%)';
                div.innerHTML = '<div style="font-size:12px; font-weight:bold; color:hsl('+hue+',70%,60%)">'+m.u+' <small style="opacity:0.4">'+m.t+'</small></div><div>'+m.txt+'</div>';
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        });
    }
</script>
</body>
</html>
