<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Final Test Chat</title>
    <style>
        body { background: #050505; color: #00ff88; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border-radius: 10px; border: none; background: #00ff88; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-section" class="box">
        <h2>🔒 ВХОД</h2>
        <input type="password" id="pass-input" placeholder="Код 4269">
        <button onclick="unlock()">ВОЙТИ</button>
    </div>

    <div id="chat-section" class="box" style="display: none;">
        <div id="chat-box" style="height: 200px; overflow-y: auto; text-align: left; margin-bottom: 10px; border-bottom: 1px solid #333;"></div>
        <input type="text" id="msg-input" placeholder="Напиши что-то">
        <button onclick="send()">ОТПРАВИТЬ</button>
    </div>

    <script>
        function unlock() {
            const pass = document.getElementById('pass-code' || 'pass-input').value;
            if (pass === "4269") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';
                alert("Успех! Теперь попробуй отправить сообщение.");
            } else { alert("Неверно!"); }
        }

        function send() {
            const input = document.getElementById('msg-input');
            const box = document.getElementById('chat-box');
            if (input.value.trim()) {
                const div = document.createElement('div');
                div.innerText = "Я: " + input.value;
                box.appendChild(div);
                input.value = "";
            }
        }
    </script>
</body>
</html>
