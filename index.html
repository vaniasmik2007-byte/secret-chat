<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Color Chat</title>
    <style>
        :root { --bg: #050505; --panel: #111; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: var(--panel); padding: 25px; border-radius: 20px; border: 1px solid #333; width: 350px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        #chat-box { height: 350px; overflow-y: auto; text-align: left; margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #222; background: rgba(0,0,0,0.2); border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #00ff88; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.03); }
        .msg b { display: block; font-size: 0.8rem; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
        .msg span { font-size: 1rem; color: #ccc; }
    </style>
</head>
<body>

    <div id="login-section" class="box">
        <h2 style="margin-top:0;">🔒 ВХІД</h2>
        <input type="text" id="user-nick" placeholder="Твій Нікнейм">
        <input type="password" id="pass-input" placeholder="Код 4269">
        <button onclick="unlock()">УВІЙТИ</button>
    </div>

    <div id="chat-section" class="box" style="display: none; width: 450px;">
        <div id="chat-box"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="msg-input" placeholder="Напиши щось...">
            <button onclick="send()" style="width: 60px;">🚀</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net"></script>

    <script>
        let chat;
        let myNick = "Анонім";

        // Функція для генерації кольору з тексту
        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            let color = '#';
            for (let i = 0; i < 3; i++) {
                let value = (hash >> (i * 8)) & 0xFF;
                color += ('00' + value.toString(16)).substr(-2);
            }
            return color;
        }

        function unlock() {
            const nick = document.getElementById('user-nick').value.trim();
            const pass = document.getElementById('pass-input').value;
            if (nick && pass === "4269") {
                myNick = nick;
                const gun = Gun(['https://gun-manhattan.herokuapp.com']);
                chat = gun.get('ivan-secret-color-chat-2026');

                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';

                chat.map().once((data, id) => {
                    if (data && data.text && data.sender) {
                        renderMsg(data.text, data.sender);
                    }
                });
            } else { alert("Введи нік та вірний код!"); }
        }

        function renderMsg(text, sender) {
            const box = document.getElementById('chat-box');
            const color = stringToColor(sender);
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b style="color: ${color}">${sender}</b> <span>${text}</span>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function send() {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                chat.set({ 
                    text: input.value.trim(),
                    sender: myNick 
                });
                input.value = "";
            }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('login-section').style.display !== 'none') unlock();
                else send();
            }
        });
    </script>
</body>
</html>
