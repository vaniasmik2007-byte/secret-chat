<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Private Chat</title>
    <style>
        :root { --primary: #ff0055; --secondary: #7000ff; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .bg-blur { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 10% 20%, #1a0033 0%, #000 100%); z-index: -1; }
        .container { width: 95%; max-width: 450px; background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 30px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8); text-align: center; }
        #chat-box { height: 400px; overflow-y: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; padding: 10px; text-align: left; }
        .msg { background: linear-gradient(135deg, var(--secondary), var(--primary)); padding: 12px 18px; border-radius: 18px; width: fit-content; max-width: 85%; align-self: flex-end; }
        input { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.15); padding: 15px; border-radius: 15px; color: white; outline: none; margin-bottom: 10px; box-sizing: border-box; }
        .main-btn { background: linear-gradient(90deg, var(--secondary), var(--primary)); border: none; border-radius: 15px; color: white; font-weight: bold; padding: 15px; cursor: pointer; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="bg-blur"></div>

    <div id="login-section" class="container">
        <h2>🔒 ПРИВАТНИЙ ВХІД</h2>
        <input type="password" id="pass-code" placeholder="Введіть код">
        <button class="main-btn" onclick="unlock()">УВІЙТИ</button>
    </div>

    <div id="chat-section" class="container" style="display: none; max-width: 550px;">
        <h3 id="status" style="color: #00ff88; font-size: 0.8rem; margin-bottom: 10px;">Online ✅</h3>
        <div id="chat-box"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="msg-input" placeholder="Повідомлення...">
            <button class="main-btn" onclick="send()" style="width: 70px;">🚀</button>
        </div>
    </div>

    <!-- Библиотеки Firebase (Compat) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <script>
        // СЕКРЕТНИЙ КОД В САМОМУ ГОРІ
        var MY_SECRET = "4269";
        var db;

        var firebaseConfig = {
            apiKey: "AIzaSyD03EYUJSS3zTbHgcZuoOWOMpHrhMMyAnM",
            authDomain: "mysecretchat-aed68.firebaseapp.com",
            projectId: "mysecretchat-aed68",
            storageBucket: "mysecretchat-aed68.firebasestorage.app",
            messagingSenderId: "1904541515416",
            appId: "1:1904541515416:web:7136a6692bd119f12fe2ed"
        };

        // Запуск після завантаження всього
        window.onload = function() {
            if (typeof firebase !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log("Firebase initialized");
            } else {
                console.error("Firebase not loaded");
            }
        };

        function unlock() {
            var input = document.getElementById('pass-code').value;
            if (input === MY_SECRET) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';
                startChat();
            } else {
                alert("Невірний код!");
            }
        }

        function startChat() {
            if (!db) { alert("База ще не завантажилась, зачекай секунду"); return; }
            db.collection("messages").orderBy("timestamp", "asc").onSnapshot(function(snap) {
                var box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(function(doc) {
                    var m = doc.data();
                    var div = document.createElement('div');
                    div.className = 'msg';
                    div.innerText = m.text;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function send() {
            var input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            db.collection("messages").add({
                text: input.value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        }
    </script>
</body>
</html>
