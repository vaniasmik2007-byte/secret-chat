<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8"><title>Elite Local Chat</title>
    <style>
        :root { --bg: #050505; --panel: #111; --primary: #00ff88; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: var(--panel); padding: 25px; border-radius: 20px; border: 1px solid #333; width: 350px; text-align: center; }
        #chat-box { height: 300px; overflow-y: auto; text-align: left; margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; border-bottom: 1px solid #222; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.03); border-left: 4px solid; }
    </style>
</head>
<body>
    <div id="login-section" class="box">
        <h2>🔒 ВХІД</h2>
        <input type="text" id="user-nick" placeholder="Твій Нікнейм">
        <input type="password" id="pass-input" placeholder="Код 4269">
        <button onclick="unlock()">УВІЙТИ</button>
    </div>
    <div id="chat-section" class="box" style="display: none; width: 450px;">
        <div id="chat-box"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="msg-input" placeholder="Напиши щось...">
            <button onclick="send()">🚀</button>
        </div>
    </div>
    <script>
        let myNick = "";
        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash % 360)}, 70%, 65%)`;
        }
        function unlock() {
            const nick = document.getElementById('user-nick').value.trim();
            if (nick && document.getElementById('pass-code' || 'pass-input').value === "4269") {
                myNick = nick;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';
            } else { alert("Введіть нік та код 4269!"); }
        }
        function send() {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                const box = document.getElementById('chat-box');
                const color = stringToColor(myNick);
                const div = document.createElement('div');
                div.className = 'msg';
                div.style.borderLeftColor = color;
                div.innerHTML = `<b style="color: ${color}">${myNick}</b><span>${input.value}</span>`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
                input.value = "";
            }
        }
    </script>
</body>
</html>
