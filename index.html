<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Media Chat v7</title>
    <style>
        :root { 
            --bg: #080808; --panel: #121212; --primary: #00ff88; 
            --text: #f0f0f0; --msg-bg: #1c1c1c; --border: #2a2a2a;
        }
        .light-theme { 
            --bg: #f5f7fa; --panel: #ffffff; --primary: #007bff; 
            --text: #1a1a1a; --msg-bg: #e9ecef; --border: #dee2e6;
        }
        
        * { box-sizing: border-box; transition: 0.2s; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 15px;
        }

        .wrapper { width: 100%; max-width: 600px; }

        .card { 
            background: var(--panel); border-radius: 24px; 
            border: 1px solid var(--border); overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        /* Авторизація */
        #login-box { padding: 30px; text-align: center; }
        input { 
            width: 100%; padding: 14px; margin: 8px 0; 
            border-radius: 12px; border: 1px solid var(--border); 
            background: rgba(0,0,0,0.2); color: inherit; outline: none;
        }
        input:focus { border-color: var(--primary); }
        
        .btn-main { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            background: var(--primary); color: #000; font-weight: bold; 
            cursor: pointer; margin-top: 15px; font-size: 16px;
        }

        /* Чат */
        .header-tools { display: flex; gap: 10px; margin-bottom: 10px; }
        .theme-btn { 
            flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--panel); color: inherit; cursor: pointer; font-size: 13px;
        }

        #chat-window { 
            height: 550px; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(0,0,0,0.03);
        }

        .message { 
            position: relative; padding: 12px 16px; border-radius: 18px; 
            background: var(--msg-bg); border-left: 4px solid var(--primary);
            max-width: 85%; align-self: flex-start; animation: pop 0.3s ease;
        }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } }

        .msg-info { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .msg-user { font-weight: bold; font-size: 14px; }
        .msg-date { opacity: 0.4; font-size: 11px; }

        .msg-actions { 
            position: absolute; right: 5px; top: -15px; 
            display: none; gap: 5px; background: var(--panel); 
            padding: 4px; border-radius: 10px; border: 1px solid var(--border);
        }
        .message:hover .msg-actions { display: flex; }

        .tool-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px; }

        .react-row { display: flex; gap: 5px; margin-top: 10px; }
        .badge { 
            background: rgba(128,128,128,0.15); padding: 3px 10px; 
            border-radius: 20px; font-size: 12px; cursor: pointer;
        }

        .media { max-width: 100%; border-radius: 12px; margin-top: 10px; display: block; }
        .download-link { 
            display: inline-flex; align-items: center; gap: 5px;
            margin-top: 8px; color: var(--primary); text-decoration: none; 
            font-size: 12px; font-weight: 600;
        }

        .input-area { display: flex; gap: 10px; padding: 20px; border-top: 1px solid var(--border); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- ЛОГІН -->
        <div id="login-section" class="card" style="max-width: 380px; margin: 0 auto;">
            <div id="login-box">
                <h2>🔐 ВХІД</h2>
                <input type="text" id="nick" placeholder="Ваш нікнейм">
                <input type="password" id="pass" placeholder="Введіть пароль">
                <button class="btn-main" onclick="login()">УВІЙТИ</button>
            </div>
        </div>

        <!-- ЧАТ -->
        <div id="chat-section" style="display: none;">
            <div class="header-tools">
                <button class="theme-btn" onclick="document.body.classList.toggle('light-theme')">🌓 ЗМІНИТИ ТЕМУ</button>
            </div>
            <div class="card">
                <div id="chat-window"></div>
                <div class="input-area">
                    <label style="cursor:pointer; font-size:24px;">📎<input type="file" id="file-input" style="display:none" onchange="uploadFile(this)"></label>
                    <input type="text" id="msg-input" placeholder="Ваше повідомлення..." onkeyup="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" style="background:var(--primary); border:none; border-radius:12px; width: 50px; height: 46px; cursor:pointer;">🚀</button>
                </div>
            </div>
        </div>
    </div>

<script>
    let user = "";
    let db = JSON.parse(localStorage.getItem('chat_v7') || '[]');
    const ding = new Audio('https://assets.mixkit.co');

    function login() {
        const p = document.getElementById('pass').value;
        const n = document.getElementById('nick').value.trim();
        if (p === "4269" && n) {
            user = n;
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('chat-section').style.display = 'block';
            draw();
        } else alert("Помилка!");
    }

    function draw() {
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        
        db.forEach((m, i) => {
            const hue = [...m.u].reduce((a,c)=>c.charCodeAt(0)+(a<<5)-a,0)%360;
            const div = document.createElement('div');
            div.className = 'message';
            div.style.borderLeftColor = `hsl(${hue}, 70%, 60%)`;
            
            let media = "";
            if (m.f) {
                const dl = `<a href="${m.f}" download="${m.fn || 'file'}" class="download-link">📥 Скачати файл</a>`;
                if (m.ft.includes('image')) media = `<img src="${m.f}" class="media">${dl}`;
                else if (m.ft.includes('video')) media = `<video src="${m.f}" controls class="media"></video>${dl}`;
                else if (m.ft.includes('audio')) media = `<audio src="${m.f}" controls style="width:100%;margin-top:10px"></audio>${dl}`;
                else media = dl;
            }

            div.innerHTML = `
                <div class="msg-actions">
                    <button class="tool-btn" onclick="react(${i},'🔥')">🔥</button>
                    <button class="tool-btn" onclick="react(${i},'👎')">👎</button>
                    <button class="tool-btn" onclick="edit(${i})">✏️</button>
                    <button class="tool-btn" onclick="del(${i})">🗑️</button>
                </div>
                <div class="msg-info">
                    <span class="msg-user" style="color:hsl(${hue}, 70%, 60%)">${m.u}</span>
                    <span class="msg-date">${m.t}</span>
                </div>
                <div style="word-break: break-word;">${m.txt}</div>
                ${media}
                <div class="react-row">
                    ${Object.entries(m.r || {}).filter(([_,c])=>c>0).map(([e,c])=>`<span class="badge" onclick="react(${i},'${e}')">${e} ${c}</span>`).join('')}
                </div>
            `;
            win.appendChild(div);
        });
        win.scrollTop = win.scrollHeight;
        localStorage.setItem('chat_v7', JSON.stringify(db));
    }

    function sendMessage() {
        const inp = document.getElementById('msg-input');
        if (!inp.value.trim()) return;
        
        addMsg(user, inp.value);
        if (inp.value.toLowerCase() === "!рандом") bot("🎲 Число: " + Math.floor(Math.random()*100));
        
        inp.value = ""; // ОЧИЩЕННЯ ПІСЛЯ ВІДПРАВКИ
        inp.focus();
    }

    function addMsg(u, txt, f=null, ft=null, fn=null) {
        db.push({ u, txt, f, ft, fn, t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), r: {} });
        ding.play().catch(()=>{});
        draw();
    }

    function react(i, e) {
        db[i].r[e] = db[i].r[e] ? 0 : 1;
        draw();
    }

    function uploadFile(el) {
        const file = el.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) return alert("Завеликий файл (max 5MB)");
        
        const reader = new FileReader();
        reader.onload = (e) => addMsg(user, "📎 Прикріплений файл:", e.target.result, file.type, file.name);
        reader.readAsDataURL(file);
        el.value = ""; 
    }

    function bot(t) { setTimeout(() => addMsg("ELITE_BOT", t), 500); }
    function del(i) { if(confirm("Видалити?")) { db.splice(i, 1); draw(); } }
    function edit(i) { const nt = prompt("Змінити:", db[i].txt); if(nt) { db[i].txt = nt + " (ред.)"; draw(); } }
</script>
</body>
</html>
