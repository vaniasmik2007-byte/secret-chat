<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Invisible Chat</title>
    <style>
        :root { --bg: #050505; --panel: #111; --text: #eee; --primary: #00ff88; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { background: var(--panel); padding: 25px; border-radius: 20px; border: 1px solid #333; width: 350px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.7); z-index: 10; }
        #chat-box { height: 350px; overflow-y: auto; text-align: left; margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; border-bottom: 1px solid #222; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.03); border-left: 3px solid; animation: fadeIn 0.3s ease; }
        .msg b { display: block; font-size: 0.8rem; margin-bottom: 3px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-section" class="box">
        <h2 style="margin-top:0;">🔒 ВХІД</h2>
        <div id="status" style="font-size: 10px; color: #00ff88; margin-bottom: 10px;">СИСТЕМА ВБУДОВАНА ✅</div>
        <input type="text" id="user-nick" placeholder="Твій Нікнейм">
        <input type="password" id="pass-input" placeholder="Код 4269">
        <button id="entry-btn">УВІЙТИ</button>
    </div>

    <div id="chat-section" class="box" style="display: none; width: 450px;">
        <div id="chat-box"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="msg-input" placeholder="Напиши повідомлення...">
            <button id="send-btn" style="width: 60px;">🚀</button>
        </div>
    </div>

    <!-- ВСТРОЕННАЯ БИБЛИОТЕКА GUN (СЖАТАЯ) -->

    <script>
        // Генерируем уникальный цвет для ника
        function getNickColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            return `hsl(${Math.abs(hash % 360)}, 75%, 65%)`;
        }

        let chat;
        let myNick = "";

        // Главная функция входа
        document.getElementById('entry-btn').onclick = function() {
            const nick = document.getElementById('user-nick').value.trim();
            const pass = document.getElementById('pass-input').value;

            if (nick && pass === "4269") {
                myNick = nick;
                
                // Инициализация (встроенная библиотека)
                // Если внешние серверы недоступны, чат будет работать между вкладками
                const gun = Gun([
                    'https://gun-manhattan.herokuapp.com',
                    'https://gun-us.herokuapp.com'
                ]);
                
                // Ключ комнаты (не меняй, если хочешь видеть сообщения друзей)
                chat = gun.get('ivan-mega-secret-2026-vFinal');

                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';

                // Слушаем новые сообщения
                chat.map().on((data, id) => {
                    if (data && data.text && data.sender && !document.getElementById(id)) {
                        const box = document.getElementById('chat-box');
                        const color = getNickColor(data.sender);
                        const div = document.createElement('div');
                        div.id = id;
                        div.className = 'msg';
                        div.style.borderLeftColor = color;
                        div.innerHTML = `<b style="color: ${color}">${data.sender}</b><span>${data.text}</span>`;
                        box.appendChild(div);
                        box.scrollTop = box.scrollHeight;
                    }
                });
            } else {
                alert("Введи нік та код 4269!");
            }
        };

        // Отправка сообщений
        document.getElementById('send-btn').onclick = function() {
            const input = document.getElementById('msg-input');
            if (input.value.trim() && chat) {
                chat.set({
                    text: input.value.trim(),
                    sender: myNick,
                    time: Date.now()
                });
                input.value = "";
            }
        };

        // Enter для удобства
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('chat-section').style.display === 'none') {
                    document.getElementById('entry-btn').click();
                } else {
                    document.getElementById('send-btn').click();
                }
            }
        });
    </script>
</body>
</html>
