<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Final Test Chat</title>
    <style>
        body { background: #050505; color: #00ff88; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #00ff88; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        #chat-box { height: 200px; overflow-y: auto; text-align: left; margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #333; font-size: 14px; }
    </style>
</head>
<body>

    <div id="login-section" class="box">
        <h2 style="margin-top:0;">🔒 ВХОД</h2>
        <input type="password" id="pass-input" placeholder="Код 4269">
        <button onclick="unlock()">ВОЙТИ</button>
    </div>

    <div id="chat-section" class="box" style="display: none; width: 400px;">
        <div id="chat-box"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="msg-input" placeholder="Напиши что-то...">
            <button onclick="send()" style="width: 60px;">🚀</button>
        </div>
    </div>

    <script>
        function unlock() {
            // Исправлено: теперь берем значение точно из того ID, который прописан выше
            const pass = document.getElementById('pass-input').value;
            if (pass === "4269") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';
            } else { 
                alert("Неверно! Попробуй 4269"); 
            }
        }

        function send() {
            const input = document.getElementById('msg-input');
            const box = document.getElementById('chat-box');
            if (input.value.trim()) {
                const div = document.createElement('div');
                div.style.marginBottom = "5px";
                div.innerText = "• " + input.value;
                box.appendChild(div);
                input.value = "";
                box.scrollTop = box.scrollHeight;
            }
        }
        
        // Чтобы заходить по нажатию Enter
        document.getElementById('pass-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') unlock();
        });
    </script>
</body>
</html>
