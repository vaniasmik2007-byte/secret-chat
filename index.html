<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Elite Chat</title>
    <style>
        :root { --primary: #ff0055; --secondary: #7000ff; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .bg-blur { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 10% 20%, #1a0033 0%, #000 100%); z-index: -1; }
        .container { width: 95%; max-width: 450px; background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 30px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8); text-align: center; }
        #chat-box { height: 350px; overflow-y: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; padding: 10px; text-align: left; background: rgba(0,0,0,0.2); border-radius: 15px; }
        .msg { background: linear-gradient(135deg, var(--secondary), var(--primary)); padding: 10px 15px; border-radius: 15px; width: fit-content; max-width: 85%; align-self: flex-start; }
        input { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.15); padding: 14px; border-radius: 15px; color: white; outline: none; margin-bottom: 10px; box-sizing: border-box; }
        .btn { background: linear-gradient(90deg, var(--secondary), var(--primary)); border: none; border-radius: 15px; color: white; font-weight: bold; padding: 14px; cursor: pointer; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="bg-blur"></div>

    <!-- ЛОГІН -->
    <div id="login-section" class="container">
        <h2>🔒 PRIVATE ACCESS</h2>
        <div id="load-info" style="color: #ff0055; font-size: 0.7rem; margin-bottom: 10px;">Завантаження...</div>
        <input type="text" id="pass-code" placeholder="Введіть код 4269">
        <button class="btn" onclick="unlock()">УВІЙТИ</button>
    </div>

    <!-- ЧАТ -->
    <div id="chat-section" class="container" style="display: none; max-width: 550px;">
        <h3 id="chat-status" style="color: #00ff88; font-size: 0.8rem; margin-bottom: 10px;">Connecting...</h3>
        <div id="chat-box"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="msg-input" placeholder="Напиши...">
            <button class="btn" onclick="send()" style="width: 70px;">🚀</button>
        </div>
    </div>

    <!-- Тільки один скрипт Firebase (Compat) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD03EYUJSS3zTbHgcZuoOWOMpHrhMMyAnM",
            authDomain: "mysecretchat-aed68.firebaseapp.com",
            projectId: "mysecretchat-aed68",
            storageBucket: "mysecretchat-aed68.firebasestorage.app",
            messagingSenderId: "1904541515416",
            appId: "1:1904541515416:web:7136a6692bd119f12fe2ed"
        };

        var db;

        window.onload = function() {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                document.getElementById('load-info').innerText = "Система готова ✅";
                document.getElementById('load-info').style.color = "#00ff88";
            } catch (e) {
                document.getElementById('load-info').innerText = "Помилка завантаження!";
            }
        };

        function unlock() {
            if (document.getElementById('pass-code').value === "4269") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';
                startChat();
            } else { alert("Невірно!"); }
        }

        function startChat() {
            db.collection("messages").orderBy("timestamp", "asc").onSnapshot((snap) => {
                document.getElementById('chat-status').innerText = "Elite Chat Online ✅";
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerText = doc.data().text;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function send() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            try {
                await db.collection("messages").add({
                    text: input.value,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = "";
            } catch(e) { alert("Помилка: " + e.message); }
        }
    </script>
</body>
</html>
